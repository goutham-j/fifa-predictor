<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Unavailable</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            text-align: center;
            background: #1e293b;
            padding: 50px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 32px;
            color: #f8fafc;
        }

        p {
            margin-bottom: 12px;
            color: #cbd5e1;
            line-height: 1.7;
        }

        .warning {
            margin-top: 20px;
            padding: 16px;
            border-radius: 8px;
            background: #fff7ed;
            color: #9a3412;
            font-weight: 600;
        }

        .button {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.2s ease;
        }

        .button:hover {
            background: #1d4ed8;
        }

        footer {
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="icon">⚠️</div>

    <h1>Oops! Something Went Wrong</h1>

    <p>
        We are unable to process your request at the moment.
    </p>

    <p>
        The application may be temporarily unavailable, under maintenance,
        or an unexpected error may have occurred.
    </p>

    <div class="warning">
        Please refresh the page or try again later.
    </div>

    <a href="/" class="button">
        Return to Home Page
    </a>

    <footer>
        FIFA 2026 World Cup Predictor
    </footer>

</div>

</body>
</html>
